aid: parseur
name: Parseur
description: >-
  Parseur is an AI-powered document and email parsing platform headquartered
  in Singapore that automatically extracts structured data from PDFs, emails,
  scanned documents, and arbitrary file uploads, then routes the resulting
  JSON, CSV, or Excel records into downstream systems via webhooks, native
  integrations, or its REST API. The platform combines Vision AI, Text AI,
  template-based extraction, OCR, normalization, and field validation behind
  a forwarding email address per mailbox, and connects to more than 1,000
  applications including Zapier, Make, n8n, Power Automate, Google Sheets,
  Airtable, Salesforce, Excel, and Slack. Parseur exposes a public REST API
  at https://api.parseur.com with an OpenAPI 3.1 specification covering
  mailbox (parser) management, document upload and lifecycle, templates,
  custom export configurations, and webhook subscriptions, secured with a
  per-account Token-based Authorization header. Pricing is volume-based on
  pages processed, with a permanent free tier (20 pages/month) and Base,
  Scale, and Enterprise tiers that scale up to 10 million pages per month.
