apis:
  - aid: parseur:parseur-api
    name: Parseur API
    description: >-
      The Parseur REST API exposes 29 operations across mailboxes (parsers),
      documents, templates, custom downloads (export configs), webhooks, and
      account bootstrap. Documents can be ingested as binary uploads to
      /parser/{id}/upload or as email/text payloads to /email; parsing is
      asynchronous, with results retrievable via /document/{id} once status
      transitions to processed. Webhooks deliver real-time events to your
      endpoint and can be enabled/disabled per mailbox. Authentication uses
      a Token-prefixed Authorization header carrying the account API key
      from the Parseur Account Overview. Base URL is https://api.parseur.com
      and rate limits are 5 requests/second per IP with a burst of 20.
    humanURL: https://developer.parseur.com/
    baseURL: https://api.parseur.com
    tags:
      - Documents
      - Mailboxes
      - Templates
      - Webhooks
      - Exports
      - AI
      - OCR
